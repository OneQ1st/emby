# --- 基础映射保持不变 ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy)" 1;
}

server {
    listen {{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$host$request_uri; }
}

server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

    # 【关键1】关闭斜杠合并，否则 http:// 会变成 http:/
    merge_slashes off;

    {{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # 优化视频流传输
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;

    # 动态解析必填
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ========================================================
    # 核心：增强型动态匹配正则
    # 能够匹配 /http://host:port/path 或 /host:port/path
    # ========================================================
    location ~* ^/(?<raw_proto>https?|wss?)?:?/?/?(?<raw_target>[a-zA-Z0-9\.-]+\.[a-z]{2,})(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # 变量初始化
        set $p_proto $inferred_proto;
        if ($raw_proto != "") { set $p_proto $raw_proto; }
        
        set $p_port "";
        if ($raw_port != "") { set $p_port ":$raw_port"; }
        
        set $p_path $raw_path;
        if ($p_path = "") { set $p_path "/"; }

        # 构造后端真实地址
        set $backend_url "$p_proto://$raw_target$p_port$p_path$is_args$args";

        proxy_pass $backend_url;

        # 【关键2】重定向拦截
        # 解释：如果后端返回 302 跳转到 http://target/abc，将其强行修改为 https://proxy/http://target/abc
        # 这样客户端下一次请求依然会带上目标地址，实现“自动续接”
        proxy_redirect ~*^https?://(?<re_host>[^/]+)(?<re_path>.*)$ https://$host/$p_proto://$re_host$re_path;
        proxy_redirect / $scheme://$host/$p_proto://$raw_target$p_port/;

        # 标准头部透传
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # 协议升级支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSL 握手支持
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_verify off;

        # 针对视频流推流的深度优化
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        proxy_force_ranges on;
        
        # 解决跨域和流媒体拖动
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 静态文件和回退
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / { rewrite ^ /static-404 last; }
}
