# 1. еҹәзЎҖжҳ е°„
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy)" 1;
}

server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$host$request_uri; }
}

server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

    # гҖҗе…ій”®гҖ‘зҰҒжӯўеҗҲе№¶ж–ңжқ пјҢзЎ®дҝқ http:// еҚҸи®®еӨҙдёҚиў«з ҙеқҸ
    merge_slashes off;

    {{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1h;
    ssl_session_tickets on;

    # жҖ§иғҪдјҳеҢ–
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    # еҠЁжҖҒеҸҚд»Јеҝ…йЎ»жңүи§ЈжһҗеҷЁ
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # ========================================================
    # ж ёеҝғйҖ»иҫ‘пјҡеҠЁжҖҒеҢ№й…Қи·Ҝеҫ„пјҲе·ІеҠ еҸҢеј•еҸ·дҝ®жӯЈ PCRE2 й”ҷиҜҜпјү
    # ========================================================
    location ~* "^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+\.[a-z]{2,})(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$" {
        
        # е®ўжҲ·з«Ҝж ЎйӘҢ
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # еҸҳйҮҸеҲқе§ӢеҢ–
        set $p_proto $inferred_proto;
        if ($raw_proto != "") { set $p_proto $raw_proto; }
        
        set $p_port "";
        if ($raw_port != "") { set $p_port ":$raw_port"; }
        
        set $p_path $raw_path;
        if ($p_path = "") { set $p_path "/"; }

        # жһ„йҖ еҗҺз«Ҝ URL
        set $target_url "$p_proto://$raw_target$p_port$p_path$is_args$args";

        # еҸҚд»Јж ёеҝғи®ҫзҪ®
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # гҖҗйҮҚзӮ№гҖ‘302 йҮҚе®ҡеҗ‘еҠ«жҢҒ
        # еҰӮжһңеҗҺз«Ҝ Emby и®©е®ўжҲ·з«Ҝи·іиҪ¬пјҢејәеҲ¶е°Ҷи·іиҪ¬ең°еқҖж”№еӣһд»ЈзҗҶең°еқҖпјҢе№¶дҝқз•ҷзӣ®ж ҮеүҚзјҖ
        proxy_redirect ~*^https?://(?<re_host>[^/]+)(?<re_path>.*)$ https://$host/$p_proto://$re_host$re_path;

        # SSL жҸЎжүӢеўһејә (SNI)
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        
        # еӨҙйғЁйҖҸдј 
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # и§Ҷйў‘жҺЁжөҒдјҳеҢ–пјҲзҰҒз”Ёзј“еӯҳпјү
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        
        # Range жӢ–еҠЁж”ҜжҢҒ
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges "bytes" always;

        proxy_connect_timeout 15s;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        
        # CORS и·Ёеҹҹж”ҜжҢҒ
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 404 йЎөйқў
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / { rewrite ^ /static-404 last; }
}
