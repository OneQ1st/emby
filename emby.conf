# --- 1. 全局映射逻辑 (保持原有功能) ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 根据端口推断协议 (保持原有逻辑)
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

# Emby 客户端特征校验 (保持原有逻辑)
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afusekt|CapyPlayer)" 1;
}

# --- 2. HTTP 基础配置 (用于重定向与验证) ---
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    # 预留给 acme.sh/certbot 的验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 3. HTTPS 核心网关配置 ---
server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2;
    server_name {{SERVER_NAME}};

    # 白名单占位符
    {{WHITELIST}}

    # 证书路径 (由脚本动态填充)
    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};

    # --- SSL 性能优化 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets on; # 开启 Session Ticket，加速 NAT 环境下的二次连接

    # --- 基础传输优化 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_max_body_size 0; # 解除上传限制 (如 Emby 上传封面/插件)

    # DNS 解析优化 (用于动态反代目标站)
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Gzip 压缩 (提升 API 响应速度)
    gzip on;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml;

    # --- 4. 核心动态路由逻辑 (100% 保持原有正则) ---
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        # 客户端校验：非 Emby 客户端直接走 404
        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }

        # 协议与端口组装逻辑
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }

        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        # 构造最终目标 URL
        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # 反向代理设置
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 流媒体传输优化：关闭所有缓存
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        proxy_max_temp_file_size 0;

        # 范围请求处理 (支持断点续传)
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        add_header Accept-Ranges "bytes" always;

        # 超时设置 (防止大文件播放中断)
        proxy_connect_timeout 45s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_socket_keepalive on;

        # 头部透传
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 兼容性设置
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect off;

        # 跨域支持
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # --- 5. 错误页面处理 ---
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
