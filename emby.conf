# --- 1. 全局映射逻辑 ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy)" 1;
}

# --- 2. HTTP 强制跳转 ---
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$host$request_uri; }
}

# --- 3. 核心 HTTPS 反代网关 ---
server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

{{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1h;
    ssl_session_tickets on;

    # 基础性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;
    
    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    # DNS 解析
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # --- 核心动态捕获 Location (修正点: 去掉反斜杠) ---
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        # 客户端校验
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # URL 拼接逻辑
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }
        
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }
        
        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # 代理核心配置
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # ================== 流量劫持替换 ==================
        proxy_set_header Accept-Encoding ""; 
        sub_filter_once off;
        sub_filter_types application/json application/x-mpegURL text/xml application/javascript text/plain;

        sub_filter '"https://' '"https://$host/https://';
        sub_filter '"http://'  '"https://$host/http://';
        sub_filter 'https://' 'https://$host/https://';
        sub_filter 'http://'  'https://$host/http://';
        
        # 防止重复包装
        sub_filter 'https://$host/https://$host/' 'https://$host/https://';
        sub_filter 'https://$host/http://$host/'  'https://$host/http://';
        
        sub_filter ':"https://' ':"https://$host/https://';
        sub_filter ':"http://'  ':"https://$host/http://';

        # ================================================================

        # 头部处理
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header CF-Connecting-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL SNI 修复
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        proxy_set_header Referer "$target_proto://$raw_target/";

        # 302 重定向包装 (修正点: 去掉反斜杠)
        proxy_redirect ~*^(https?)://([^/:]+):(\d+)(/.*)?$ /https://$2:$3$4;
        proxy_redirect ~*^(https?)://([^/:]+)(/.*)?$ /https://$2$3;
        proxy_redirect ~*^/(.*)$ /$target_proto://$raw_target$target_port/$1;
        
        # 流媒体优化
        proxy_hide_header Content-Type;
        add_header Content-Type $upstream_http_content_type always;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges "bytes" always;

        # 超时与授权
        proxy_connect_timeout 15s;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 静态 404
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / { rewrite ^ /static-404 last; }
}