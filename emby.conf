# --- 1. 全局映射逻辑 ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 端口协议自动推断
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

# 客户端 UA 校验白名单
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy|Infuse|Emby|VidHub|Fileball)" 1;
}

# --- 2. HTTP 强制跳转 HTTPS ---
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$http_host$request_uri; }
}

# --- 3. 核心 HTTPS 全自动反代网关 ---
server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

{{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1h;
    ssl_session_tickets on;

    # 基础网络性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0; # 允许大文件上传/转码
    
    # Gzip 压缩 (客户端侧)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml application/x-mpegURL;

    # DNS 解析器 (保证动态域名的极速解析，处理网盘外链必备)
    resolver 1.1.1.1 8.8.8.8 223.5.5.5 valid=300s ipv6=off;
    resolver_timeout 5s;

    # --- 核心网关 Location：万能匹配引擎 ---
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        # 严格客户端校验拦截
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # URL 组件拆解与重组
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }
        
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }
        
        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        # 最终组装出的真实后端请求地址 (网盘直链、内网 IP 等)
        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # ============== 核心代理传参 ==============
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # ============== 流量自动化劫持 (魔法核心) ==============
        # 强制 Emby 后端不要压缩 JSON/M3U8，否则 Nginx 无法读取和修改内容！
        proxy_set_header Accept-Encoding ""; 
        
        sub_filter_once off;
        # 覆盖所有 Emby 可能返回流地址的响应类型
        sub_filter_types application/json application/x-mpegURL text/xml application/javascript text/plain;

        # 【级别 1：标准 URL 替换】(处理 M3U8 和未转义文本)
        sub_filter 'http://'  'https://$http_host/http://';
        sub_filter 'https://' 'https://$http_host/https://';

        # 【级别 2：处理 JSON 深度转义 URL】(极为关键，防漏网之鱼)
        # 匹配 Emby API 返回的 "http:\/\/" 形式
        sub_filter 'http:\/\/'  'https:\/\/$http_host\/http:\/\/';
        sub_filter 'https:\/\/' 'https:\/\/$http_host\/https:\/\/';

        # 【级别 3：自我套娃修复】(防止多次替换导致 URL 无限变长)
        sub_filter 'https://$http_host/https://$http_host/' 'https://$http_host/https://';
        sub_filter 'https://$http_host/http://$http_host/'  'https://$http_host/http://';
        
        sub_filter 'https:\/\/$http_host\/https:\/\/$http_host\/' 'https:\/\/$http_host\/https:\/\/';
        sub_filter 'https:\/\/$http_host\/http:\/\/$http_host\/'  'https:\/\/$http_host\/http:\/\/';
        # ========================================================

        # 伪装头部：让目标服务器(如 115、阿里云盘)以为是客户端直接访问
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 隐匿 Nginx 代理身份 (防网盘反扒)
        proxy_hide_header CF-Connecting-IP;
        proxy_hide_header X-Powered-By;

        # HTTPS 目标访问修正 (SNI 必须开启)
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        proxy_set_header Referer "$target_proto://$raw_target/";

        # 处理目标服务器可能返回的 301/302 重定向，继续将其包装在我们的反代中
        proxy_redirect ~*^https?://([^/:]+):(\d+)(/.*)?$ /https://$1:$2$3;
        proxy_redirect ~*^https?://([^/:]+)(/.*)?$ /https://$1$2;
        proxy_redirect ~*^/(.*)$ /https://$raw_target$target_port/$1;
        
        # 流媒体传输极致优化 (关闭缓冲，支持进度条拖拽)
        proxy_hide_header Content-Type;
        add_header Content-Type $upstream_http_content_type always;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_buffering off;         # 核心：不缓存视频流，边拉边推
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        
        # 强制支持 Range 请求 (拖动视频进度条必须)
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges "bytes" always;

        # 超时时间设置 (避免长视频断流)
        proxy_connect_timeout 15s;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        
        # Emby 原生授权透传
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # 彻底解决跨域问题
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 拦截非法客户端的 404 伪装页面
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    # 兜底：所有不符合提取规则的直接拦截
    location / { rewrite ^ /static-404 last; }
}
