# Emby 通用动态反代配置 - 修复增强版
# 修复了 proxy_redirect 语法错误并清理了潜在的不可见字符

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy)" 1;
}

map $raw_target $dynamic_sni {
    hostnames;
    default    $raw_target;
{{DYNAMIC_MAP}}
}

server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

{{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1h;
    ssl_session_tickets on;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # ==================== 核心动态反代 Location ====================
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        if ($is_emby_client = 0) { 
            rewrite ^ /static-404 last; 
        }

        set $target_proto $inferred_proto;
        if ($raw_proto != "") { 
            set $target_proto $raw_proto; 
        }

        set $target_port "";
        if ($raw_port != "") { 
            set $target_port ":$raw_port"; 
        }

        set $final_path $raw_path;
        if ($final_path = "") { 
            set $final_path "/"; 
        }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        proxy_pass $target_url;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_ssl_server_name on;
        proxy_ssl_name $dynamic_sni;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        
        proxy_set_header Host $dynamic_sni;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # ==================== 体验加强部分（已修正逻辑） ====================
        
        # 1. 修正后的重定向处理：将上游返回的 Location 映射回代理地址
        # 移除了容易引起歧义的 \~ 前缀，改为标准正则 ~
        proxy_redirect ~^http://([^/]+)(/.*)$   https://$host/http/$1$2;
        proxy_redirect ~^https://([^/]+)(/.*)$  https://$host/https/$1$2;
        # 修正相对路径重定向，避免使用变量名冲突
        proxy_redirect / /;

        # 2. Range 请求优化
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;
        add_header Accept-Ranges "bytes" always;

        # 3. 流媒体 buffering 与 timeout 优化
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 4. 缓冲与性能设置
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_set_header X-Accel-Buffering no;

        # CORS 支持
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { 
            return 204; 
        }
    }

    # 静态 404 防护
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    # 默认兜底保护
    location / {
        rewrite ^ /static-404 last;
    }
}
