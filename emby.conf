# --- 全局映射：处理 WebSocket 与 协议判定 ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 智能协议判定：根据端口自动选择 http/https
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

# 客户端白名单：确保 Hills、Infuse、Emby 等正常通行
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Emby|MB3|MediaBrowser|Jellyfin|Hills|yamby|RodelPlayer|Afusekt|CapyPlayer|VLC|MPV|MPC-HC|Infuse|Fileball|SenPlayer|WMP)" 1;
}

# --- HTTP 自动跳转 HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};
    
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS 核心网关 ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    # SSL 证书路径
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # DNS 解析优化
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # 【安全拦截】
    if ($is_emby_client = 0) {
        rewrite ^ /static-404 last;
    }

    # 【核心动态反代逻辑】
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        # 协议初始化
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }
        
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        # 构造目标 URL
        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # 代理设置
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL 与 缓存策略
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_buffering off;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # 【自定义 404 路径】
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    # 默认兜底
    location / {
        rewrite ^ /static-404 last;
    }
}
