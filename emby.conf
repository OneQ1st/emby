# 1. 基础映射：处理协议升级
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 2. 默认协议推断：当 URL 中未指定 http/https 时使用的回退逻辑
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

# 3. 客户端合法性校验
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy)" 1;
}

# HTTP 强制跳转 HTTPS
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$host$request_uri; }
}

server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

    # 允许特殊 URL 格式 (如 http://)
    merge_slashes off;

    {{WHITELIST}}

    # SSL 证书配置
    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1h;
    ssl_session_tickets on;

    # 性能优化参数
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;
    
    # Gzip 压缩支持
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    # 动态反代必须配置解析器
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # ========================================================
    # 核心：动态推流地址提取逻辑
    # 匹配模式支持: 
    # 1. /http://target.com:8096/path
    # 2. /target.com_8096/path (使用下划线避免冒号冲突)
    # 3. /target.com/path (默认 443/https)
    # ========================================================
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+\.[a-z]{2,})(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        # 拦截非指定客户端
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # 逻辑：确定目标协议
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { 
            set $target_proto $raw_proto; 
        }

        # 逻辑：确定目标端口
        set $target_port "";
        if ($raw_port != "") { 
            set $target_port ":$raw_port"; 
        }

        # 逻辑：处理路径（如果为空则补齐根目录）
        set $final_path $raw_path;
        if ($final_path = "") { 
            set $final_path "/"; 
        }

        # 构造最终后端 URL
        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # 反向代理核心设置
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 动态 SNI 支持：这是解决证书握手失败的关键
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off; 
        
        # 头部伪装：让后端认为请求是直接发给它的
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        # 修正后端重定向：防止跳转到后端私网 IP 或原始域名
        proxy_redirect ~*https?://$raw_target(?<rel_path>.*) https://$host/$target_proto://$raw_target$target_port$rel_path;

        # 针对 Emby 视频流的缓冲区优化
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        
        # 视频拖动支持 (Range Headers)
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges "bytes" always;

        # 长连接超时设置
        proxy_connect_timeout 15s;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        
        # 跨域头支持
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 静态 404 页面
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    # 兜底策略
    location / { 
        rewrite ^ /static-404 last; 
    }
}
