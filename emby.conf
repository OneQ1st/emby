# ==========================================
# 1. MAP DEFINITIONS (逻辑保持不变)
# ==========================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afusekt|CapyPlayer)" 1;
}

# ==========================================
# 2. HTTP REDIRECT (逻辑保持不变)
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# 3. HTTPS GATEWAY (性能优化核心区)
# ==========================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on; 

    # ==================== 客户端 Keepalive 优化 ====================
    keepalive_timeout 120s;
    keepalive_requests 5000;

    server_name {{DOMAIN}};

    # --- SSL/TLS 握手性能优化 ---
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    
    ssl_session_cache shared:SSL:20m; 
    ssl_session_timeout 1h;
    ssl_session_tickets on; 
    
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- TCP 传输层优化 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server_tokens off;
    client_max_body_size 0;

    # ==================== DNS 缓存优化 ====================
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # ==================== 核心转发区 (已修正 location 修饰符) ====================
    # 注意：此处去掉了 ~* 前面的反斜杠
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        # --- 变量解析 ---
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }

        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # --- 代理基础设置 ---
        proxy_pass $target_url;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- 缓冲区与流媒体特性优化 ---
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;

        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;
        proxy_max_temp_file_size 0;

        # --- 连接与超时优化 ---
        proxy_socket_keepalive on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 15s;

        # --- 请求头伪装与转发 ---
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;

        # --- 客户端限制逻辑 ---
        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }
    }

    # ==================== 静态拦截区 ====================
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
