# --- MAP DEFINITIONS ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afusekt|CapyPlayer)" 1;
}

# --- HTTP REDIRECT ---
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS GATEWAY ---
server {
    # 修复 HTTP/2 语法警告（新版本 Nginx 推荐写法）
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on; 

    server_name {{DOMAIN}};

    # SSL 配置
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    server_tokens off;
    client_max_body_size 0;

    resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;
    resolver_timeout 5s;

    # ==================== 修复后的正则表达式位置 ====================
    # 删除了错误的反斜杠，确保 ~* 正确引导正则
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }

        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        proxy_pass $target_url;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;

        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }
    }

    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
