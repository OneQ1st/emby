
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afusekt|CapyPlayer)" 1;
}

server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen {{HTTPS_PORT}} ssl;
    listen [::]:{{HTTPS_PORT}} ssl;
    http2 on;

    keepalive_timeout 300s;
    keepalive_requests 10000;

    server_name {{SERVER_NAME}};

    {{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve X25519:prime256v1;

    ssl_session_cache shared:SSL:20m; 
    ssl_session_timeout 1h;
    ssl_session_tickets on; 

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server_tokens off;
    client_max_body_size 0;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }

        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }

        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        proxy_pass $target_url;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_cache off;
        proxy_store off;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;

        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
        proxy_max_temp_file_size 0;

        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        add_header Accept-Ranges "bytes" always;

        proxy_connect_timeout 45s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_socket_keepalive on;
        proxy_ignore_client_abort on;

        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
