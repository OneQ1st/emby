# ==========================================
# 1. MAP DEFINITIONS
# ==========================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afusekt|CapyPlayer|Emby|Electron)" 1;
}

# ==========================================
# 2. HTTP REDIRECT
# ==========================================
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# 3. HTTPS GATEWAY (高性能优化版)
# ==========================================
server {
    listen {{HTTPS_PORT}} ssl;
    listen [::]:{{HTTPS_PORT}} ssl http2;
    # http2 on; # 较新版本 Nginx 可开启此行

    # --- 连接优化 ---
    keepalive_timeout 300s;
    keepalive_requests 10000;

    server_name {{SERVER_NAME}};

    {{WHITELIST}}

    # --- 证书占位符 ---
    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    
    # --- SSL 安全与握手加速 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve X25519:prime256v1;

    ssl_session_cache shared:SSL:20m; 
    ssl_session_timeout 1h;
    ssl_session_tickets on; 

    # --- 传输层优化 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_max_body_size 0;

    # --- DNS 解析优化 ---
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # --- Gzip 压缩调优 ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    # ==================== 核心：动态正则反代逻辑 ====================
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        # 安全过滤
        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }

        # 逻辑：自动协议推断
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }

        # 逻辑：端口处理
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }

        # 逻辑：路径处理
        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        # 拼接 URL
        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        proxy_pass $target_url;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- 流媒体专项：禁用缓存与缓冲 ---
        proxy_cache off;
        proxy_store off;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;

        # --- Buffer 调优 ---
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
        proxy_max_temp_file_size 0;

        # --- 范围请求支持 (Range) ---
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        add_header Accept-Ranges "bytes" always;

        # --- 超时与连接保护 (24小时) ---
        proxy_connect_timeout 45s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_socket_keepalive on;
        proxy_ignore_client_abort on;

        # --- 头部透传 ---
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # --- 兼容性设置 ---
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect off;

        # 跨域
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # --- 错误页面配置 ---
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
