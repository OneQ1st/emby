# ==========================================
# 1. MAP DEFINITIONS
# ==========================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 协议推断逻辑
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default   "https";
}

# 增强型客户端识别：覆盖原生 App 常见特征，提升 Afusekt/CapyPlayer 兼容性
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy|Emby|Electron|Infuse|Fileball|SenPlayer|StellarPlayer)" 1;
}

# ==========================================
# 2. HTTP REDIRECT
# ==========================================
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# 3. HTTPS GATEWAY (全能动态优化版)
# ==========================================
server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 

    server_name {{SERVER_NAME}};

    # --- IP 白名单注入点 ---
{{WHITELIST}}

    # --- 证书与安全配置 ---
    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve X25519:prime256v1;

    ssl_session_cache shared:SSL:20m; 
    ssl_session_timeout 1h;
    ssl_session_tickets on; 

    # --- 性能优化参数 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_max_body_size 0;

    # HSTS 增强
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # DNS 解析优化
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types application/json text/plain text/css text/javascript application/javascript application/xml image/svg+xml;

    # ==================== 核心：全动态正则反代逻辑 ====================
    # 支持带 SNI 格式: /sni-domain@https://target-domain/path
    # 支持标准格式: /https://target-domain/path
    location ~* ^/(?:(?<custom_sni>[a-zA-Z0-9\.-]+)@)?(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {

        # 访问控制
        if ($is_emby_client = 0) {
            rewrite ^ /static-404 last;
        }

        # 1. 确定真实的 SNI / Host 变量
        set $real_sni $raw_target;
        if ($custom_sni != "") {
            set $real_sni $custom_sni;
        }

        # 2. 变量构造
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }
        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        # 3. 反向代理核心配置
        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- 核心优化：动态 SNI 与 Host 锁定 (解决 CDN 负载均衡关键) ---
        proxy_ssl_server_name on;
        proxy_ssl_name $real_sni;
        proxy_set_header Host $real_sni;

        # --- 核心优化：拦截并重写重定向 (防止 App 跳出反代) ---
        proxy_redirect ~*https?://$real_sni(?<rel_path>.*) https://$host$rel_path;
        proxy_redirect off;

        # --- 原生 App 缓冲区优化 (解决 Afusekt/CapyPlayer 卡顿) ---
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;

        # --- 流媒体实时性调优 ---
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # --- 范围请求优化 (支持拖动进度条) ---
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges "bytes" always;

        # --- 超时与连接设置 ---
        proxy_connect_timeout 15s;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        proxy_socket_keepalive on;
        proxy_ignore_client_abort on;

        # --- 头部透传 ---
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;

        proxy_ssl_verify off;

        # --- 跨域处理 ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' 'X-Emby-Authorization, Content-Type, Authorization, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 404 页面
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    location / {
        rewrite ^ /static-404 last;
    }
}
