# --- 1. 全局映射逻辑 ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 端口协议自动推断
map $raw_port $inferred_proto {
    "80"      "http";
    "8096"    "http";
    "8097"    "http";
    "8880"    "http";
    "2333"    "http";
    default    "https";
}

# 客户端 UA 校验白名单 (保持你的原生 UA 逻辑)
map $http_user_agent $is_emby_client {
    default 0;
    "~*(Hills|yamby|Afuse|Capy|Emby)" 1;
}

# --- 2. HTTP 强制跳转 HTTPS ---
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};
    location / { return 301 https://$http_host$request_uri; }
}

# --- 3. 核心 HTTPS 全自动反代网关 ---
server {
    listen {{HTTPS_PORT}} ssl http2;
    listen [::]:{{HTTPS_PORT}} ssl http2; 
    server_name {{SERVER_NAME}};

{{WHITELIST}}

    ssl_certificate {{SSL_CERTIFICATE}};
    ssl_certificate_key {{SSL_CERTIFICATE_KEY}};
    ssl_protocols TLSv1.2 TLSv1.3;

    # 基础性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    client_max_body_size 0; 
    
    # DNS 解析器
    resolver 1.1.1.1 8.8.8.8 223.5.5.5 valid=300s ipv6=off;
    resolver_timeout 5s;

    # ===================================================================
    # 核心网关 Location：万能匹配引擎 (保留你的原始正则)
    # ===================================================================
    location ~* ^/(?:(?<raw_proto>https?|wss?)://)?(?<raw_target>[a-zA-Z0-9\.-]+)(?:(?:_|:)(?<raw_port>\d+))?(?<raw_path>/.*)?$ {
        
        # 严格客户端校验
        if ($is_emby_client = 0) { rewrite ^ /static-404 last; }

        # URL 组装逻辑
        set $target_proto $inferred_proto;
        if ($raw_proto != "") { set $target_proto $raw_proto; }
        set $target_port "";
        if ($raw_port != "") { set $target_port ":$raw_port"; }
        set $final_path $raw_path;
        if ($final_path = "") { set $final_path "/"; }

        set $target_url "$target_proto://$raw_target$target_port$final_path$is_args$args";

        proxy_pass $target_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # ============== 深度内容劫持 (解决反代别人的 Emby 核心) ==============
        proxy_set_header Accept-Encoding ""; 
        sub_filter_once off;
        sub_filter_types application/json application/x-mpegURL text/xml application/javascript text/plain;

        # 【逻辑：先全部加前缀，再排除主站自己】
        # 1. 将所有 http/https 链接改为指向你的反代
        sub_filter 'http://'  'https://$http_host/http://';
        sub_filter 'https://' 'https://$http_host/https://';
        
        # 2. 处理转义形式的 URL (JSON 常用)
        sub_filter 'http:\/\/'  'https:\/\/$http_host\/http:\/\/';
        sub_filter 'https:\/\/' 'https:\/\/$http_host\/https:\/\/';

        # 3. 重要：如果检测到目标就是“别人主站域名”，则把前缀去掉（防止主站 API 无法加载）
        # 这里使用你的动态变量 $raw_target 自动适配，无需手动填域名！
        sub_filter 'https://$http_host/https://$raw_target' 'https://$raw_target';
        sub_filter 'https:\/\/$http_host\/https:\/\/$raw_target' 'https:\/\/$raw_target';

        # 4. 你的原生“自我套娃”修复逻辑
        sub_filter 'https://$http_host/https://$http_host/' 'https://$http_host/https://';
        sub_filter 'https://$http_host/http://$http_host/'  'https://$http_host/http://';
        # =================================================================

        # 头部伪装与 SNI
        proxy_set_header Host $raw_target;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_name $raw_target;
        proxy_ssl_verify off;
        proxy_set_header Referer "$target_proto://$raw_target/";

        # 递归重定向劫持 (保持原样)
        proxy_redirect ~*^https?://([^/:]+):(\d+)(/.*)?$ /https://$1:$2$3;
        proxy_redirect ~*^https?://([^/:]+)(/.*)?$ /https://$1$2;
        proxy_redirect ~*^/(.*)$ /https://$raw_target$target_port/$1;
        
        # 流媒体传输极致优化 (保持原样)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_force_ranges on;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # 跨域头 (保持原样)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # 404 伪装
    location = /static-404 {
        root /var/www/emby-404;
        try_files /cyber-404.html =404;
    }

    # 首页自动引导：如果你直接访问域名，自动重定向到某个默认反代的目标（可选）
    location / {
         # 例如：rewrite ^/$ /https://目标主站域名.com/ permanent;
         rewrite ^ /static-404 last;
    }
}
